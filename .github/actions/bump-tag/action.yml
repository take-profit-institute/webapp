# candle-k8s ApplicationSet의 서비스 image tag를 bump → ArgoCD가 동기화
name: bump-tag
description: Update service image tag in candle-k8s
inputs:
  service: { required: true }
  tag: { required: true }
  env: { required: true, default: dev }
  appset: { required: false, default: services, description: "services | batch" }
  token: { required: true, description: candle-k8s push 권한 PAT/App 토큰 }
runs:
  using: composite
  steps:
    - name: Checkout candle-k8s
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/candle-k8s
        token: ${{ inputs.token }}
        path: _candle-k8s
    - name: Bump & push
      shell: bash
      run: |
        cd _candle-k8s
        FILE="platform/applications/${{ inputs.appset }}-${{ inputs.env }}.yaml"
        SVC='${{ inputs.service }}'
        if [ "$SVC" = "*" ]; then
          yq -i '(.spec.generators[0].list.elements[]).tag = "${{ inputs.tag }}"' "$FILE"
        else
          yq -i "(.spec.generators[0].list.elements[] | select(.name == \"$SVC\")).tag = \"${{ inputs.tag }}\"" "$FILE"
        fi
        git config user.name "candle-ci"
        git config user.email "ci@candle.local"
        git add "$FILE"
        git commit -m "deploy(${{ inputs.env }}): ${{ inputs.service }} -> ${{ inputs.tag }}" || { echo "no change"; exit 0; }
        git push
