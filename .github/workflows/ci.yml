name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ steps.filter.outputs.bff }}
      webapp: ${{ steps.filter.outputs.webapp }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bff:    ['bff/**', 'shared/**']
            webapp: ['webapp/**', 'shared/**']
            admin:  ['admin/**', 'shared/**']

  # dev 태그는 로컬/CI/배포 환경에서 함께 쓰므로 amd64 + arm64 manifest를 같이 푸시한다.
  push-bff:
    needs: changes
    if: needs.changes.outputs.bff == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bff/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            yyubin/candle-bff:dev
            yyubin/candle-bff:${{ github.sha }}
          cache-from: type=gha,scope=bff
          cache-to: type=gha,mode=max,scope=bff

  push-webapp:
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: webapp/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            yyubin/candle-webapp:dev
            yyubin/candle-webapp:${{ github.sha }}
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,mode=max,scope=webapp

  push-admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: admin/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            yyubin/candle-admin:dev
            yyubin/candle-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
