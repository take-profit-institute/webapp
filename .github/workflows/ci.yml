name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ steps.filter.outputs.bff }}
      webapp: ${{ steps.filter.outputs.webapp }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bff:    ['bff/**', 'shared/**']
            webapp: ['webapp/**', 'shared/**']
            admin:  ['admin/**', 'shared/**']

  # dev 태그는 로컬/CI/배포 환경에서 함께 쓰므로 amd64 + arm64 manifest를 같이 푸시한다.
  # bff: ECR push + candle-k8s services-<env>.yaml 태그 bump (백엔드 aws-ci.yml과 동일 패턴).
  # k8s가 기대하는 <account>.dkr.ecr.../candle/bff:<SHA> 로 올린다. (Docker Hub 아님)
  # EKS 노드는 amd64라 amd64만 빌드. 자격증명은 OIDC(ci_deploy_role).
  push-bff:
    needs: changes
    if: needs.changes.outputs.bff == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bff/Dockerfile
          push: true
          platforms: linux/amd64
          # ECR IMMUTABLE: SHA 태그만(고유). :dev 같은 이동 태그는 덮어쓰기 불가라 넣지 않는다.
          tags: ${{ steps.ecr.outputs.registry }}/candle/bff:${{ github.sha }}
          cache-from: type=gha,scope=bff
          cache-to: type=gha,mode=max,scope=bff
      - uses: ./.github/actions/bump-tag
        if: github.event_name != 'pull_request'
        with:
          service: bff
          tag: ${{ github.sha }}
          env: dev
          appset: services
          token: ${{ secrets.GITOPS_TOKEN }}

  # bff → Docker Hub (yyubin/candle-bff:dev). ECR(push-bff)와 별개로, 로컬/수동 배포에서
  # 끌어다 쓰는 이동 태그(:dev)를 Docker Hub에 올린다. Docker Hub는 ECR과 달리 태그 덮어쓰기 허용.
  # :dev 는 로컬(arm64)·클러스터(amd64) 양쪽에서 쓰이므로 멀티아치 매니페스트로 푸시한다.
  # 자격증명: repo secrets DOCKERHUB_USERNAME / DOCKERHUB_TOKEN (Docker Hub access token).
  push-bff-dockerhub:
    needs: changes
    if: needs.changes.outputs.bff == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # arm64 크로스빌드용 에뮬레이터
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          # 컨텍스트는 모노레포 루트(shared + bff 함께 빌드), Dockerfile 은 bff/Dockerfile
          context: .
          file: bff/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: yyubin/candle-bff:dev
          cache-from: type=gha,scope=bff-hub
          cache-to: type=gha,mode=max,scope=bff-hub

  # webapp: 정적 export(next output=export) → S3 sync → CloudFront invalidation.
  # 컨테이너 대신 CloudFront+S3(static-site 모듈)로 서빙한다. 자격증명은 GitHub OIDC로
  # ci_deploy_role 을 assume (정적 키 없음). role/bucket/dist 는 Terraform output 값을
  # 레포 Secrets/Variables 에 등록한다.
  deploy-webapp:
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      # 빌드 타임에 정적 번들로 박히는 dev 공개 URL (dev.candle.io.kr).
      # 정적 export는 NEXT_PUBLIC_*가 빌드 시점에 박히므로 여기서 dev 엔드포인트를 준다.
      NEXT_PUBLIC_API_BASE_URL: https://api.dev.candle.io.kr
      NEXT_PUBLIC_AUTH_BASE_URL: https://api.dev.candle.io.kr
      NEXT_PUBLIC_WS_BASE_URL: wss://ws.dev.candle.io.kr
      NEXT_PUBLIC_CHAT_API_BASE_URL: https://ws.dev.candle.io.kr
      NEXT_PUBLIC_CHAT_WS_BASE_URL: wss://ws.dev.candle.io.kr
      NEXT_PUBLIC_OAUTH_REDIRECT_BRIDGE_URL: https://app.dev.candle.io.kr/auth/callback
      NEXT_PUBLIC_OAUTH_NATIVE_REDIRECT_URI: com.candle.app://auth/callback
      # Firebase 웹 클라이언트 config (공개 값 — env 무관 동일). 미설정 시 FCM 초기화 실패.
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAf6a4Z6eyjt4svQDgCglP_xdCtUsozV2w
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: candle-bfce9.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: candle-bfce9
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: candle-bfce9.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "712132485233"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:712132485233:web:1d160ba1748475bd103bd0"
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-Z9E5649TY7
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: BDviTHHrHk_L_UaMyfCrlvBr1aUG18XWx98IDociuUDaNmAxNqNrVgDqaNQ67SqVBMuZOjukMwcuwf6SVn4sQhA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @candle/shared
      # NEXT_OUTPUT=export → webapp/out 정적 번들 생성
      - run: npm run build:app -w @candle/webapp
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync webapp/out "s3://${{ vars.WEBAPP_S3_BUCKET }}" --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.WEBAPP_CLOUDFRONT_ID }}" --paths "/*"

  # admin: 정적 export(next output=export) → S3 sync → CloudFront invalidation.
  # webapp 과 동일 패턴 (OIDC 로 ci_deploy_role assume, 정적 키 없음).
  deploy-admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      # dev 공개 URL (빌드 타임 정적 번들에 박힘)
      NEXT_PUBLIC_API_BASE_URL: https://api.dev.candle.io.kr
      NEXT_PUBLIC_AUTH_BASE_URL: https://api.dev.candle.io.kr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @candle/shared
      # next.config output=export → admin/out 정적 번들 생성
      - run: npm run build -w @candle/admin
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync admin/out "s3://${{ vars.ADMIN_S3_BUCKET }}" --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.ADMIN_CLOUDFRONT_ID }}" --paths "/*"
